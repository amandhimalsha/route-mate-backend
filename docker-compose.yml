version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=routemate_password
      - DB_NAME=routemate_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - FUEL_PRICE_PER_LITER=1.50
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      - mysql
      - redis
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
    networks:
      - routemate-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=routemate_password
      - MYSQL_DATABASE=routemate_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    networks:
      - routemate-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - routemate-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - routemate-network

volumes:
  mysql_data:
  redis_data:

networks:
  routemate-network:
    driver: bridge
